# ============================================================================
# TradeFlow Backend - Application Configuration (Local Development)
# ============================================================================

# ─── Server ────────────────────────────────────────────────
server.port=${PORT:8080}
spring.application.name=tradeflow-backend

# ─── MySQL Database ────────────────────────────────────────
# Override via environment variables in production
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/tradeflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── HikariCP Connection Pool ─────────────────────────────
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=20
spring.jpa.open-in-view=false

# ─── Flyway Migrations ────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT Configuration ────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dHJhZGVmbG93LXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1zaWduaW5nLXRoaXMtc2hvdWxkLWJlLWxvbmctZW5vdWdoLWZvci1obWFjLXNoYTUxMg==}
app.jwt.expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# ─── Jackson JSON ──────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ─── CORS ──────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:https://vansh-jyotishi.github.io,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500}

# ─── Logging ───────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.tradeflow.backend=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
